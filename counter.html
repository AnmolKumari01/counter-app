<body>
    <h1> Counter App </h1>
    <h2 id="count">0</h2>
    <p id="msg"></p>
        
        <button onclick="increase()">+</button>
        <button onclick="decrease()">-</button>
        <button onclick="reset()">Reset</button>
        <script>
            let count=0;
            function increase(){
                count++;
                document.getElementById("count").innerText=count;
            }
            function decrease(){
                count--;
                document.getElementById("count").innerText=count;
            }
            function reset(){
                count=0;
                document.getElementById("count").innerText=count;
            }
        </script>
    </body>
